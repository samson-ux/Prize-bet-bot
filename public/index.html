<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courtsiding Bot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: #111118;
      border-bottom: 1px solid #2a2a35;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .status-bar {
      display: flex;
      gap: 16px;
    }

    .status-dot {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #888;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #333;
    }

    .dot.green { background: #22c55e; box-shadow: 0 0 6px #22c55e66; }
    .dot.red { background: #ef4444; box-shadow: 0 0 6px #ef444466; }
    .dot.yellow { background: #eab308; box-shadow: 0 0 6px #eab30866; }

    /* ── Main Layout ── */
    .main {
      display: grid;
      grid-template-columns: 1fr 320px;
      grid-template-rows: 1fr 1fr;
      gap: 1px;
      background: #1a1a25;
      flex: 1;
      overflow: hidden;
    }

    .panel {
      background: #0d0d14;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      background: #111118;
      padding: 8px 14px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666;
      border-bottom: 1px solid #1a1a25;
      flex-shrink: 0;
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px 14px;
    }

    /* Scrollbar */
    .panel-body::-webkit-scrollbar { width: 6px; }
    .panel-body::-webkit-scrollbar-track { background: transparent; }
    .panel-body::-webkit-scrollbar-thumb { background: #2a2a35; border-radius: 3px; }

    /* ── Transcript Panel ── */
    #transcript-panel { grid-row: 1; grid-column: 1; }

    .transcript-line {
      padding: 3px 0;
      line-height: 1.5;
      color: #aaa;
      border-bottom: 1px solid #1a1a2008;
    }

    .transcript-line.final { color: #e0e0e0; }

    /* ── Player Tracker Panel ── */
    #player-panel { grid-row: 1; grid-column: 2; }

    .player-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #1a1a25;
    }

    .player-name {
      font-weight: 600;
      color: #fff;
      font-size: 13px;
    }

    .player-stats {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .stat-count {
      font-size: 20px;
      font-weight: 700;
      color: #22c55e;
      min-width: 30px;
      text-align: center;
    }

    .stat-line {
      font-size: 11px;
      color: #666;
    }

    .bet-badge {
      background: #22c55e;
      color: #000;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      text-transform: uppercase;
    }

    .no-players {
      color: #444;
      text-align: center;
      padding: 40px 0;
      font-style: italic;
    }

    /* ── Log Panel ── */
    #log-panel { grid-row: 2; grid-column: 1 / -1; }

    .log-line {
      padding: 2px 0;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .log-line .time { color: #555; }
    .log-line .tag { color: #6366f1; font-weight: 600; }
    .log-line.warn .tag { color: #eab308; }
    .log-line.error .tag { color: #ef4444; }
    .log-line .msg { color: #ccc; }
    .log-line.warn .msg { color: #eab308; }
    .log-line.error .msg { color: #ef4444; }

    /* ── Shot Alert Overlay ── */
    .shot-alert {
      position: fixed;
      top: 60px;
      right: 20px;
      padding: 14px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      opacity: 0;
      transform: translateX(100px);
      transition: all 0.3s ease;
      z-index: 100;
      pointer-events: none;
    }

    .shot-alert.show {
      opacity: 1;
      transform: translateX(0);
    }

    .shot-alert.made {
      background: #22c55e22;
      border: 1px solid #22c55e;
      color: #22c55e;
    }

    .shot-alert.missed {
      background: #ef444422;
      border: 1px solid #ef4444;
      color: #ef4444;
    }

    .shot-alert.unknown {
      background: #eab30822;
      border: 1px solid #eab308;
      color: #eab308;
    }

    /* ── Empty state ── */
    .empty-state {
      color: #333;
      text-align: center;
      padding: 60px 20px;
    }

    .empty-state .big { font-size: 32px; margin-bottom: 8px; }
  </style>
</head>
<body>

  <header>
    <h1>COURTSIDING BOT</h1>
    <div class="status-bar">
      <div class="status-dot"><div class="dot" id="dot-sse"></div> Dashboard</div>
      <div class="status-dot"><div class="dot" id="dot-discord"></div> Discord</div>
      <div class="status-dot"><div class="dot" id="dot-deepgram"></div> Deepgram</div>
      <div class="status-dot"><div class="dot" id="dot-pipeline"></div> Pipeline</div>
    </div>
  </header>

  <div class="main">
    <!-- Live Transcript -->
    <div class="panel" id="transcript-panel">
      <div class="panel-header">Live Transcript</div>
      <div class="panel-body" id="transcript-feed">
        <div class="empty-state"><div class="big">...</div>Waiting for audio</div>
      </div>
    </div>

    <!-- Player Tracker -->
    <div class="panel" id="player-panel">
      <div class="panel-header">Player Tracker</div>
      <div class="panel-body" id="player-list">
        <div class="no-players">No players detected yet</div>
      </div>
    </div>

    <!-- Event Log -->
    <div class="panel" id="log-panel">
      <div class="panel-header">Event Log</div>
      <div class="panel-body" id="log-feed"></div>
    </div>
  </div>

  <!-- Shot Alert Popup -->
  <div class="shot-alert" id="shot-alert"></div>

  <script>
    const transcriptFeed = document.getElementById('transcript-feed');
    const playerList = document.getElementById('player-list');
    const logFeed = document.getElementById('log-feed');
    const shotAlert = document.getElementById('shot-alert');
    const dotSSE = document.getElementById('dot-sse');
    const dotDiscord = document.getElementById('dot-discord');
    const dotDeepgram = document.getElementById('dot-deepgram');
    const dotPipeline = document.getElementById('dot-pipeline');

    let players = {};
    let transcriptStarted = false;
    let alertTimeout = null;

    // ── SSE Connection ──
    function connectSSE() {
      const es = new EventSource('/events');

      es.onopen = () => {
        dotSSE.className = 'dot green';
      };

      es.onerror = () => {
        dotSSE.className = 'dot red';
        setTimeout(connectSSE, 3000);
      };

      // Log events
      es.addEventListener('log', (e) => {
        const data = JSON.parse(e.data);
        addLogLine(data);
        updateStatusDots(data);
      });

      // Transcript events
      es.addEventListener('transcript', (e) => {
        const data = JSON.parse(e.data);
        addTranscript(data);
      });

      // Shot events
      es.addEventListener('shot', (e) => {
        const data = JSON.parse(e.data);
        showShotAlert(data);
        updatePlayer(data.player, data.result);
      });

      // Stats updates
      es.addEventListener('stats', (e) => {
        const data = JSON.parse(e.data);
        syncStats(data);
      });
    }

    // ── Transcript Feed ──
    function addTranscript(data) {
      if (!transcriptStarted) {
        transcriptFeed.innerHTML = '';
        transcriptStarted = true;
      }

      const div = document.createElement('div');
      div.className = 'transcript-line' + (data.isFinal ? ' final' : '');
      div.textContent = data.text;
      transcriptFeed.appendChild(div);

      // Keep max 200 lines
      while (transcriptFeed.children.length > 200) {
        transcriptFeed.removeChild(transcriptFeed.firstChild);
      }

      transcriptFeed.scrollTop = transcriptFeed.scrollHeight;
    }

    // ── Log Feed ──
    function addLogLine(data) {
      const div = document.createElement('div');
      div.className = 'log-line ' + data.level;
      div.innerHTML =
        '<span class="time">[' + escapeHtml(data.line.match(/\[([^\]]+)\]/)?.[1] || '') + ']</span> ' +
        '<span class="tag">[' + escapeHtml(data.module) + ']</span> ' +
        '<span class="msg">' + escapeHtml(data.msg) + '</span>';
      logFeed.appendChild(div);

      while (logFeed.children.length > 500) {
        logFeed.removeChild(logFeed.firstChild);
      }

      logFeed.scrollTop = logFeed.scrollHeight;
    }

    // ── Player Tracker ──
    function updatePlayer(name, result) {
      if (!players[name]) {
        players[name] = { count: 0, betPlaced: false };
      }
      if (result === 'made') {
        players[name].count++;
      }
      renderPlayers();
    }

    function syncStats(stats) {
      for (const [name, data] of Object.entries(stats)) {
        players[name] = { count: data.threeCount, betPlaced: data.betPlaced };
      }
      renderPlayers();
    }

    function renderPlayers() {
      const names = Object.keys(players);
      if (names.length === 0) {
        playerList.innerHTML = '<div class="no-players">No players detected yet</div>';
        return;
      }

      playerList.innerHTML = names.map(name => {
        const p = players[name];
        const badge = p.betPlaced ? '<span class="bet-badge">Bet Placed</span>' : '';
        return `
          <div class="player-row">
            <div>
              <div class="player-name">${escapeHtml(name)}</div>
              ${badge}
            </div>
            <div class="player-stats">
              <div>
                <div class="stat-count">${p.count}</div>
                <div class="stat-line">3PT Made</div>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    // ── Shot Alert ──
    function showShotAlert(data) {
      if (alertTimeout) clearTimeout(alertTimeout);

      const label = data.result === 'made' ? 'MADE'
        : data.result === 'missed' ? 'MISSED' : 'UNKNOWN';

      shotAlert.textContent = `${data.player} — ${label} 3PT`;
      shotAlert.className = 'shot-alert ' + data.result + ' show';

      alertTimeout = setTimeout(() => {
        shotAlert.className = 'shot-alert';
      }, 3000);
    }

    // ── Status Dots ──
    function updateStatusDots(data) {
      const msg = data.msg.toLowerCase();
      if (msg.includes('connected to discord') || msg.includes('voice channel')) {
        dotDiscord.className = 'dot green';
      }
      if (msg.includes('websocket connected') && data.module === 'DEEPGRAM') {
        dotDeepgram.className = 'dot green';
      }
      if (msg.includes('pipeline active')) {
        dotPipeline.className = 'dot green';
      }
      if (msg.includes('disconnected')) {
        if (data.module === 'AUDIO') dotDiscord.className = 'dot red';
        if (data.module === 'DEEPGRAM') dotDeepgram.className = 'dot red';
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ── Init ──
    connectSSE();

    // Fetch initial stats
    fetch('/api/stats')
      .then(r => r.json())
      .then(data => { syncStats(data); })
      .catch(() => {});
  </script>
</body>
</html>
